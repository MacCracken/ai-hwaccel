name: Release

on:
  push:
    tags: ["*"]

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build (${{ matrix.target }})
    needs: [ci]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            arch: linux-arm64
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch: windows-amd64
            ext: .exe
          - target: aarch64-apple-darwin
            os: macos-latest
            arch: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross-compilation deps (arm64 linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          ARCHIVE="ai-hwaccel-${VERSION}-${{ matrix.arch }}.tar.gz"
          tar czf "${ARCHIVE}" -C target/${{ matrix.target }}/release ai-hwaccel
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
        shell: bash
      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          $VERSION = (Get-Content VERSION).Trim()
          $ARCHIVE = "ai-hwaccel-${VERSION}-${{ matrix.arch }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/ai-hwaccel.exe" -DestinationPath $ARCHIVE
          (Get-FileHash $ARCHIVE -Algorithm SHA256).Hash + "  " + $ARCHIVE | Out-File "${ARCHIVE}.sha256" -Encoding ascii
        shell: pwsh
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-hwaccel-${{ matrix.arch }}
          path: |
            ai-hwaccel-*.tar.gz
            ai-hwaccel-*.tar.gz.sha256
            ai-hwaccel-*.zip
            ai-hwaccel-*.zip.sha256

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [ci, build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"
      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ci, build, publish]
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ai-hwaccel-*.tar.gz
            ai-hwaccel-*.tar.gz.sha256
            ai-hwaccel-*.zip
            ai-hwaccel-*.zip.sha256
          generate_release_notes: true
