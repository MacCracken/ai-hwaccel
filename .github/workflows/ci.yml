name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          # Use the canonical installer so the layout matches what
          # `cyrius deps` and `cyriusly` expect: a per-version tree
          # under ~/.cyrius/versions/$VER/{bin,lib}/, plus
          # ~/.cyrius/current + the ~/.cyrius/{bin,lib} → versions/$VER
          # symlinks. cyrius deps reads stdlib from ~/.cyrius/lib;
          # without the symlinks the stdlib copy fails with
          # "cannot read ./lib/<name>.cyr" for every [deps].stdlib entry.
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -E '^cyrius[[:space:]]*=' cyrius.cyml | sed -E 's/^cyrius[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf "https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh" \
            | CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Verify toolchain
        run: cyrius --version

      - name: Resolve dependencies
        # `./lib/` is gitignored — `cyrius deps` populates it from the
        # version-pinned stdlib snapshot. Must run before any compile
        # step. Matches agnosys/libro/patra convention.
        run: cyrius deps

      - name: Verify dep hashes
        # `cyrius.lock` records the hash of each [deps.<git>] entry —
        # ai-hwaccel is stdlib-only (no external git deps), so cyrius
        # deps emits no lockfile and there is nothing to verify. The
        # check stays in place so it engages automatically the day a
        # git dep gets added.
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "no cyrius.lock (stdlib-only project) — nothing to verify"
          fi

      - name: Include-graph audit
        # `cyrius vet` walks every `include` from src/main.cyr and
        # reports untrusted / missing entries. Catches drift between
        # the in-tree includes and the manifest [deps] stdlib snapshot.
        run: cyrius vet src/main.cyr

      - name: Raw-offset guard (#derive(accessors) structs)
        # For each struct with `#derive(accessors)`, no file outside its
        # defining file may do raw `load64(<param> + N)` /
        # `store64(<param> + N, ...)` / `load64(<param>)` on it — those
        # are accessor-only surfaces. Mirrors the libro v2.6.x gate.
        #
        # Two checks (libro pattern):
        # (1) `check_struct`  — cross-file specific-struct guard. Only
        #     works when the canonical param name is unambiguous across
        #     src/ (verified by `grep -rnE 'load64\(<param> \+ [0-9]+\)'
        #     src/`).
        # (2) `check_offset_bound` — per-(file, param, struct, field
        #     count). For structs whose canonical param name is shared
        #     across files (e.g. `e` here is used by both `est` and
        #     `runtime_env`). Validates that every raw-offset site in
        #     the defining file stays within the registered struct's
        #     field range (catches off-by-one after a field-count
        #     shrink, and accidental access past the struct boundary
        #     after another struct grows).
        run: |
          FAILED=0
          check_struct() {
            local struct="$1" defining="$2" param="$3"
            local hits
            hits=$(grep -rnE "load64\($param \+ [0-9]+\)|store64\($param \+ [0-9]+|load64\($param\)" src/ 2>/dev/null \
              | grep -v "^$defining:" || true)
            if [ -n "$hits" ]; then
              echo "FAIL: raw-offset reads/writes on struct $struct outside $defining (param '$param'):"
              echo "$hits"
              echo "  → use the $struct""_* derived accessors (getters + _set_ setters)."
              FAILED=1
            fi
          }
          check_offset_bound() {
            local file="$1" param="$2" struct="$3" field_count="$4"
            local max_offset=$(( (field_count - 1) * 8 ))
            local hits
            hits=$(grep -nE "(load64|store64)\($param[ ]*\+[ ]*[0-9]+" "$file" 2>/dev/null || true)
            [ -z "$hits" ] && return 0
            while IFS= read -r line; do
              local offset
              offset=$(echo "$line" | grep -oE "\+[ ]*[0-9]+" | head -1 | grep -oE "[0-9]+")
              [ -z "$offset" ] && continue
              if [ "$offset" -gt "$max_offset" ]; then
                echo "FAIL in $file: offset +$offset on param '$param' exceeds struct '$struct' (${field_count} fields → max +$max_offset):"
                echo "  $line"
                echo "  → check the offset, the struct field count, or whether this should use the $struct""_* derived accessors."
                FAILED=1
              fi
            done <<< "$hits"
          }
          # Cross-file specific-struct guards (unambiguous param names).
          # struct  | defining file        | canonical param
          check_struct storage  src/system_io.cyr  sd
          check_struct ic       src/system_io.cyr  ic
          check_struct plan     src/system_io.cyr  sp
          # Field-count bound checks (ambiguous param `e` shared between
          # est and runtime_env; meta and model both use `m`).
          # file                  | param | struct       | fields
          check_offset_bound src/training.cyr  e  est           4
          check_offset_bound src/system_io.cyr e  runtime_env   8
          check_offset_bound src/model_format.cyr m meta          5
          if [ $FAILED -ne 0 ]; then exit 1; fi
          echo "Raw-offset guard: clean (all sites use derived accessors or registered raw-offset params)."

      - name: Format check
        # cyrius fmt <file> emits the formatted source to stdout; diff
        # against the committed file to enforce no drift.
        run: |
          fail=0
          for f in src/*.cyr src/detect/*.cyr tests/tcyr/*.tcyr fuzz/*.fcyr benches/*.bcyr; do
            [ -f "$f" ] || continue
            if ! diff -q <(cyrius fmt "$f" 2>/dev/null) "$f" > /dev/null; then
              echo "needs fmt: $f"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "fmt: drift detected"; exit 1; }

      - name: Lint
        run: |
          for f in src/*.cyr src/detect/*.cyr; do
            [ -f "$f" ] || continue
            cyrius lint "$f" || true
          done

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/ai-hwaccel
          echo "ai-hwaccel: $(wc -c < build/ai-hwaccel) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/ai-hwaccel | grep -q "7f45 4c46"

      - name: Test suite
        # `tests/tcyr/*.tcyr` — descriptive-named test units. Each
        # `.tcyr` is a standalone compilation unit (see 2.1.0 arc).
        run: |
          pass=0; fail=0
          for t in tests/tcyr/*.tcyr; do
            [ -f "$t" ] || continue
            name=$(basename "$t" .tcyr)
            echo "=== $name ==="
            CYRIUS_DCE=1 cyrius build "$t" "/tmp/ci_$name"
            if "/tmp/ci_$name" 2>&1 | tee "/tmp/${name}_out" | tail -1 | grep -q "0 failed"; then
              pass=$((pass + 1))
            else
              fail=$((fail + 1))
              echo "FAIL: $t"
            fi
            rm -f "/tmp/ci_$name"
          done
          echo "$pass passed, $fail failed"
          test $fail -eq 0

      - name: Fuzz
        run: |
          for f in fuzz/*.fcyr; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .fcyr)
            CYRIUS_DCE=1 cyrius build "$f" "build/$name"
            timeout 10 "build/$name" || { echo "FUZZ CRASH: $name"; exit 1; }
            echo "  $name: ok"
          done

      - name: Benchmarks
        env:
          AI_HWACCEL_BENCH_HISTORY: ${{ github.workspace }}/bench-history.csv
          AI_HWACCEL_BENCH_TAG: ${{ github.sha }}
        run: |
          for f in benches/*.bcyr; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .bcyr)
            CYRIUS_DCE=1 cyrius build "$f" "build/$name"
            "build/$name"
          done

      - name: Upload bench history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-history-${{ github.sha }}
          path: bench-history.csv
          if-no-files-found: ignore
          retention-days: 90

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md CLAUDE.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md LICENSE VERSION cyrius.cyml; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          # cyrius.cyml uses ${file:VERSION} interpolation, so VERSION
          # is the single source of truth. Assert the interpolation
          # literal is present (so cyrius resolves it correctly) and
          # the VERSION value appears in CHANGELOG.
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          grep -q '^version = "\${file:VERSION}"' cyrius.cyml || {
            echo "FAIL: cyrius.cyml version must be \${file:VERSION}"; exit 1; }
          grep -q "\[$FILE_VERSION\]" CHANGELOG.md || {
            echo "FAIL: version $FILE_VERSION not in CHANGELOG.md"; exit 1; }
          echo "Version consistent: $FILE_VERSION (VERSION → cyrius.cyml via \${file:VERSION})"
