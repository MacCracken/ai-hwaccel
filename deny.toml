# cargo-deny 0.19+ configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true

[advisories]
# Advisory database is checked by default; no additional config needed.

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    "GPL-3.0-only",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
